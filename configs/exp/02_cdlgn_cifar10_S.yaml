# Phase 1 M4 — LogicTreeNet-S sanity run on CIFAR-10.
# Paper target (Petersen et al. 2024, Table 1): 60.38% test acc.
# Phase-1 sanity bar: discretized test acc >= 58.4% (paper - 2%).
# If S misses, debug before spending compute on M.

TRAINING:
  # 40 epochs with cosine LR schedule (paper Table 6 lists constant lr=0.02
  # without an explicit schedule; cosine is a defensive add to test whether
  # the val plateau at ~55-65% is partly an LR-too-high issue late in training).
  seed: 0
  max_epochs: 40
  deterministic: false
  num_sanity_val_steps: 0
  matmul_precision: high

DISTRIBUTED:
  accelerator: gpu
  devices: 4                          # tmux 0: 4× RTX A6000
  num_nodes: 1
  strategy: ddp

DATA:
  name: cifar10
  args:
    data_root: data
    n_bits: 3
    val_size: 5000
    split_seed: 42
    download: true
  dataloader:
    # Per-GPU batch size; with 4 GPUs the effective batch is 128 (paper).
    batch_size: 32
    test_batch_size: 64
    num_workers: 4
    persistent_workers: true
    pin_memory: true
    drop_last: false
    shuffle_train: true

MODEL:
  name: cdlgn_classifier
  args:
    backbone: cdlgn
    in_channels: 9                   # 3 channels × 3 thermometer bits
    k: 32                            # paper S
    tree_depth: 3
    channel_groups: 4                # paper §A.3: k/8 = 4 for S (conv blocks).
    dense_channel_groups: 4          # paper §A.3 says grouping holds throughout
                                     # the network; match channel_groups so the
                                     # k/8-group split is preserved end-to-end
                                     # until GroupSum recombination.
    num_classes: 10
    tau: 20.0                        # paper τ for S (small model)
    residual_init_z3: 5.0
    grad_factor: 1.0
    lr: 0.02
    weight_decay: 0.002
    lr_schedule: cosine
    lr_schedule_T_max: 40
    lr_schedule_eta_min: 1.0e-5

OPTIMIZER:
  name: AdamW
  arguments:
    lr: 0.02
    weight_decay: 0.002
  gradient_clip:
    enabled: false
  gradient_accumulation:
    enabled: false
  stochastic_weight_averaging:
    enabled: false

SCHEDULER:
  learning_rate:
    enabled: true
    name: CosineAnnealingLR
    arguments:
      T_max: 40                       # match max_epochs
      eta_min: 1.0e-5                 # ~lr/2000 floor at end of cosine
    interval: epoch
  early_stopping:
    enabled: false

LOGGER:
  log_dir_root: lightning_logs
  experiment_name: 02_cdlgn_cifar10_S

CHECKPOINT:
  enabled: true
  every_n_epochs: 1
  monitor: val_acc
  mode: max
  filename: "best-{epoch:03d}-{val_acc:.4f}"
  save_top_k: 1
  save_last: true

DIAGNOSTICS:
  gradient_norm_logger: true
  gradient_norm_log_every_n_steps: 50

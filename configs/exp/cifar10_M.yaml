# CIFAR-10 — torchlogix `ClgnCifar10Medium` (paper-spec, k_num=256,
# group_size=2, tau=40). Stage-A green at test_acc 60.12% / 10 epochs;
# val_acc was still climbing → 40-epoch run is the standing baseline.

TRAINING:
  seed: 0
  max_epochs: 40
  deterministic: false
  num_sanity_val_steps: 0
  matmul_precision: high

DISTRIBUTED:
  accelerator: gpu
  devices: 4                          # 4× RTX A6000 on the GPU node
  num_nodes: 1
  strategy: ddp

DATA:
  name: cifar10
  args:
    data_root: data
    n_bits: 2                         # M expects 2 input bits via FixedBinarization
    val_size: 5000
    split_seed: 42
    download: true
    apply_thermometer: false          # torchlogix's FixedBinarization handles this
  dataloader:
    batch_size: 32                    # per-GPU; 4× GPUs → effective 128 (paper)
    test_batch_size: 64
    num_workers: 4
    persistent_workers: true
    pin_memory: true
    drop_last: false
    shuffle_train: true

MODEL:
  name: torchlogix_classifier
  args:
    backbone: cifar10
    backbone_kwargs:
      size: M                         # → ClgnCifar10Medium (k_num=256, tau=40, group_size=2)
      grad_factor: 1.0
      parametrization: raw
    num_classes: 10
    lr: 0.02                          # paper Table 6 for M
    weight_decay: 0.002
    lr_schedule: null                 # paper recipe is constant LR

OPTIMIZER:
  name: AdamW
  arguments:
    lr: 0.02
    weight_decay: 0.002
  gradient_clip:
    enabled: false
  gradient_accumulation:
    enabled: false
  stochastic_weight_averaging:
    enabled: false

SCHEDULER:
  learning_rate:
    enabled: false
  early_stopping:
    enabled: false

LOGGER:
  log_dir_root: lightning_logs
  experiment_name: cifar10_M

CHECKPOINT:
  enabled: true
  every_n_epochs: 1
  monitor: val_acc
  mode: max
  filename: "best-{epoch:03d}-{val_acc:.4f}"
  save_top_k: 1
  save_last: true

DIAGNOSTICS:
  gradient_norm_logger: false

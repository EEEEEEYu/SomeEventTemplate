# Stage 4 — streaming buffer architecture (proposal v2 §Stage 4 / v2.1 Tier 1).
#
# Tier 0 (cross-bit shifts on a 2-second word) capped at test_acc 73.48%, below
# the 80% gate. Per proposal v2.1, the next move is the streaming buffer with
# always-on additions enabled and `tbptt_k = N` (full BPTT, Tier 1) since N is
# small. Re-uses the patched DVS-Gesture cache (32×32 downsample, 16ms × 128 =
# 2.048 s window — same encoder spec, but consumed per-slice this time).
#
# Decision gate (proposal §Stage 4):
#   - DVS-Gesture streaming run beats Tier 0's 73.48% test_acc, AND
#   - operator-choice histogram across slice rows ≥ 0.3 non-zero
#     (i.e. the cross-slice operator isn't collapsing to "always read row 0").
#
# Hyperparameters chosen to fit on 2× L40S 48 GB DDP with reasonable batch.
# The cross-slice family materialises [B, hidden, M] but does NOT have the
# Tier-0 quadratic-in-M soft-shift cost — the bottleneck is the per-step
# encoder forward × T = 32 slices instead.

TRAINING:
  seed: 0
  max_epochs: 50
  deterministic: false
  num_sanity_val_steps: 0
  # tbptt_k governs FeatureBuffer's gradient depth.
  # Tier 1 = None (full BPTT). With N=32 small enough that this is tractable.
  # Tier 2 = k (e.g. 4 or 8) when full BPTT runs out of memory.
  tbptt_k: 4                 # placeholder; the model arg `tbptt_k: null` overrides
  encoder_warmup_epochs: 5   # P2 hook duplicate; the model arg below is what
                             # StreamingClassifier reads
  matmul_precision: high
  compile_model: false       # body-only compile is a follow-up; off for first run

DISTRIBUTED:
  accelerator: gpu
  devices: 2
  num_nodes: 1
  strategy: ddp_find_unused_parameters_true   # required for encoder warmup

DATA:
  name: dvsgesture_per_slice
  args:
    data_root: data
    num_bins: 32                        # T = 32 slices per sample
    bin_duration_us: 64_000             # 64 ms × 32 = 2.048 s window (same span as Tier 0)
    sensor_h: 32
    sensor_w: 32
    download: true
  dataloader:
    batch_size: 8                       # streaming forward × T=32 + buffer state ⇒ memory
                                        # is roughly T × per-step. Conservative first run.
    test_batch_size: 8
    num_workers: 4
    persistent_workers: true
    pin_memory: true
    drop_last: true
    shuffle_train: true
    shuffle_val: false
    shuffle_test: false

MODEL:
  name: streaming_classifier
  args:
    in_features: 2048               # 2 polarities × 32 × 32, same as Tier 0
    M: 32                           # buffer bit-width — matches difflogic's int32 packing
    # Halving staircase from 2048 to 32 (=M). Each step halves so difflogic's
    # `2*out >= in` constraint holds at every layer. Six layers gets us from
    # 2048 to 32; the last entry must equal M.
    encoder_dims: [1024, 512, 256, 128, 64, 32]
    N: 32                           # slice history depth
    tbptt_k: null                   # null = full BPTT (Tier 1)
    cross_slice_family: difflogic16
    decoder_hidden_dim: 4070        # 4070 × 32 = 130_240 = 11 × 11_840 ✓
    decoder_num_layers: 3
    num_classes: 11
    tau: 100.0                      # group_size = 11_840; tau/group_size ≈ 0.0085 — same
                                    # softmax-temperature regime as Stage 1's tau=10/800.
    lr: 0.01                        # Stage 1's discovered LR
    grad_factor: 2.0                # proposal §Stage 1 task 2: "for deep models
                                    # (>6 layers), the grad_factor should be
                                    # increased (e.g., 2) to avoid vanishing
                                    # gradients". Streaming has 6 encoder + 1
                                    # cross-slice + 3 decoder = 10 chained
                                    # bin_op_s mixtures. CPU smoke confirmed
                                    # encoder grad mass ~1e-7 at default
                                    # grad_factor=1.0; doubling per layer
                                    # offsets the geometric Jacobian contraction.
    connections: random
    warmup_steps: 16                # T = 32 = N here, so the proposal default
                                    # `warmup_steps = N` would never trigger loss
                                    # accumulation. 16 = N/2 lets the second half
                                    # of slices contribute (buffer is still mostly
                                    # filled). Tune up for tighter buffer-population
                                    # discipline; tune down for more loss signal.
    loss_at_every_step: true
    encoder_warmup_epochs: 5
    device: cuda

OPTIMIZER:
  name: Adam
  arguments:
    lr: 0.01
  gradient_clip:
    enabled: true
    gradient_clip_val: 1.0
    gradient_clip_algorithm: norm
  gradient_accumulation:
    enabled: false
  stochastic_weight_averaging:
    enabled: false

SCHEDULER:
  learning_rate:
    enabled: false
  early_stopping:
    enabled: false

LOGGER:
  log_dir_root: lightning_logs
  experiment_name: S4_streaming_dvsgesture

CHECKPOINT:
  enabled: true
  every_n_epochs: 1
  monitor: val_acc
  mode: max
  filename: "best-{epoch:03d}-{val_acc:.4f}"
  save_top_k: 1
  save_last: true

DIAGNOSTICS:
  gradient_norm_logger: true
  gradient_norm_log_every_n_steps: 20

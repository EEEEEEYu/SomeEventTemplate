# Stage 1 — Lightning wrap of difflogic on MNIST.
# Acceptance gate: discretized test_acc >= 97.10% (proposal §Stage 1, anchored
# to the 97.40% Stage 0 baseline ±0.3%).

TRAINING:
  seed: 0                       # matches difflogic/experiments/main.py default
  max_epochs: 100               # 100 * 500 = 50k steps; Stage 0 plateaued at ~36k iters
                                # (97.40%). 30-epoch attempt landed at 96.7% — undertrained,
                                # not a wiring bug.
  deterministic: false
  num_sanity_val_steps: 0       # difflogic's first eval is at iter 2k; skip Lightning's
                                # 2-step sanity that would run before any training.

DISTRIBUTED:
  accelerator: gpu
  devices: 1
  num_nodes: 1
  strategy: auto

DATA:
  name: mnist
  args:
    data_root: data
    val_size: 10000
    split_seed: 42
    download: true
  dataloader:
    batch_size: 100             # matches Stage 0 -bs 100
    test_batch_size: 100
    num_workers: 4
    persistent_workers: true
    pin_memory: true
    drop_last: true             # difflogic uses drop_last=True on MNIST loaders
    shuffle_train: true
    shuffle_val: false
    shuffle_test: false

MODEL:
  name: logic_classifier
  args:
    in_dim: 784
    hidden_dim: 8000            # matches Stage 0 -k 8000
    num_layers: 6               # matches Stage 0 -l 6
    num_classes: 10
    tau: 10.0                   # matches Stage 0 -t 10
    connections: random
    lr: 0.01                    # CRITICAL: difflogic's relaxation needs lr=0.01

OPTIMIZER:
  name: Adam                    # configure_optimizers in LogicClassifier owns the optimizer;
  arguments:                    # these fields are unused for Stage 1 but must satisfy schema.
    lr: 0.01
  gradient_clip:
    enabled: false
  gradient_accumulation:
    enabled: false
  stochastic_weight_averaging:
    enabled: false

SCHEDULER:
  learning_rate:
    enabled: false              # difflogic's reference does not use an LR schedule.
  early_stopping:
    enabled: false

LOGGER:
  log_dir_root: lightning_logs
  experiment_name: 01_mnist_lightning

CHECKPOINT:
  enabled: true
  every_n_epochs: 1
  monitor: val_acc
  mode: max
  filename: "best-{epoch:03d}-{val_acc:.4f}"
  save_top_k: 1
  save_last: true

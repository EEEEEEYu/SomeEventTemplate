# Phase 1 M3.5 — pipeline smoke test with stub CNN backbone.
# Purpose: validate CIFAR-10 datamodule, thermometer encoding, Lightning glue,
# and manifest writing BEFORE plugging in the real CDLGN backbone. Loss should
# decrease meaningfully in <= 200 steps; this is not a meaningful accuracy run.

TRAINING:
  seed: 0
  max_epochs: 2
  deterministic: false
  num_sanity_val_steps: 0

DISTRIBUTED:
  accelerator: auto
  devices: 1
  num_nodes: 1
  strategy: auto

DATA:
  name: cifar10
  args:
    data_root: data
    n_bits: 3
    val_size: 5000
    split_seed: 42
    download: true
  dataloader:
    batch_size: 128
    test_batch_size: 256
    num_workers: 2
    persistent_workers: true
    pin_memory: true
    drop_last: false
    shuffle_train: true

MODEL:
  name: cdlgn_classifier
  args:
    backbone: stub_conv
    in_channels: 9                   # 3 channels × 3 thermometer bits
    k: 16                            # tiny stub width
    num_classes: 10
    lr: 0.001
    weight_decay: 0.0
    # The remaining args are unused by the stub backbone but must be present
    # to satisfy the CDLGNClassifier constructor.
    tree_depth: 3
    channel_groups: 1
    tau: 10.0
    residual_init_z3: 5.0

OPTIMIZER:
  name: AdamW
  arguments:
    lr: 0.001
  gradient_clip:
    enabled: false
  gradient_accumulation:
    enabled: false
  stochastic_weight_averaging:
    enabled: false

SCHEDULER:
  learning_rate:
    enabled: false
  early_stopping:
    enabled: false

LOGGER:
  log_dir_root: lightning_logs
  experiment_name: 01_cdlgn_cifar10_smoke

CHECKPOINT:
  enabled: true
  every_n_epochs: 1
  monitor: val_acc
  mode: max
  filename: "best-{epoch:03d}-{val_acc:.4f}"
  save_top_k: 1
  save_last: true

DIAGNOSTICS:
  gradient_norm_logger: false

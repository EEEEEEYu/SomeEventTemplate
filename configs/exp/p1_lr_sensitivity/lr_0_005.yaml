# P1 task 3 (proposal v2.1 §Phase P) — LR sensitivity, lr=0.005.
# Short run (30 epochs ≈ 15k iters) to confirm 0.01 isn't on a knife-edge.
# Stage 1's 100-epoch reference was 97.36%; here we look at trajectory
# stability, not final accuracy.

TRAINING:
  seed: 0
  max_epochs: 30
  deterministic: false
  num_sanity_val_steps: 0

DISTRIBUTED:
  accelerator: gpu
  devices: 1
  num_nodes: 1
  strategy: auto

DATA:
  name: mnist
  args:
    data_root: data
    val_size: 10000
    split_seed: 42
    download: true
  dataloader:
    batch_size: 100
    test_batch_size: 100
    num_workers: 4
    persistent_workers: true
    pin_memory: true
    drop_last: true
    shuffle_train: true
    shuffle_val: false
    shuffle_test: false

MODEL:
  name: logic_classifier
  args:
    in_dim: 784
    hidden_dim: 8000
    num_layers: 6
    num_classes: 10
    tau: 10.0
    connections: random
    lr: 0.005

OPTIMIZER:
  name: Adam
  arguments:
    lr: 0.005
  gradient_clip:
    enabled: false
  gradient_accumulation:
    enabled: false
  stochastic_weight_averaging:
    enabled: false

SCHEDULER:
  learning_rate:
    enabled: false
  early_stopping:
    enabled: false

LOGGER:
  log_dir_root: lightning_logs
  experiment_name: p1_lr_0_005

CHECKPOINT:
  enabled: true
  every_n_epochs: 5
  monitor: val_acc
  mode: max
  filename: "best-{epoch:03d}-{val_acc:.4f}"
  save_top_k: 1
  save_last: true
